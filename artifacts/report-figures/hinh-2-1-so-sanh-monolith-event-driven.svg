</style><rect class='bg' width='1600' height='1000'/><text x="80" y="80" class="title">Hình 2.1. So sánh monolith/request-response và event-driven microservices</text><text x="80" y="118" class="subtitle">Khác biệt về coupling, scaling và khả năng replay trong audio analytics</text>
<rect x="90" y="180" width="640" height="650" class="box box-red"/><text x="135" y="235" class="label">Monolith / request-response</text><rect x="170" y="310" width="470" height="260" class="box"/><text x="220" y="365" class="label">Ứng dụng nguyên khối</text><text x="220" y="410" class="small">Decode → segment → features</text><text x="220" y="445" class="small">Ghi DB → dashboard</text><text x="220" y="500" class="small">Scale toàn bộ ứng dụng</text><path class="arrow" d="M405 570 V650"/><rect x="210" y="650" width="390" height="85" class="box box-gray"/><text x="245" y="703" class="small">Lỗi một bước có thể chặn pipeline</text>
