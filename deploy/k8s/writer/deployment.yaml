apiVersion: apps/v1
kind: Deployment
metadata:
  name: writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: writer
        app.kubernetes.io/part-of: fma-small-analytics
    spec:
      containers:
        - name: writer
          image: event-driven-audio-analytics-writer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: platform-secrets
          env:
            - name: SERVICE_NAME
              value: writer
          readinessProbe:
            exec:
              command:
                - python
                - -m
                - event_driven_audio_analytics.writer.app
                - preflight
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 15
