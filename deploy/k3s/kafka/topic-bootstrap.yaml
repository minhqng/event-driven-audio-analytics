apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-bootstrap
  namespace: fma-small-analytics
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-topic-bootstrap
        app.kubernetes.io/part-of: fma-small-analytics
    spec:
      restartPolicy: Never
      containers:
        - name: kafka-topic-bootstrap
          image: bitnamilegacy/kafka:3.9.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              bootstrap_server="${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
              kafka_topics="/opt/bitnami/kafka/bin/kafka-topics.sh"
              for attempt in $(seq 1 30); do
                if "$kafka_topics" --bootstrap-server "$bootstrap_server" --list >/dev/null 2>&1; then
                  break
                fi
                if [ "$attempt" -eq 30 ]; then
                  echo "Kafka broker did not become ready in time." >&2
                  exit 1
                fi
                sleep 2
              done
              for topic in audio.metadata audio.segment.ready audio.features system.metrics audio.dlq; do
                "$kafka_topics" \
                  --bootstrap-server "$bootstrap_server" \
                  --create \
                  --if-not-exists \
                  --topic "$topic" \
                  --partitions 1 \
                  --replication-factor 1
              done
              "$kafka_topics" --bootstrap-server "$bootstrap_server" --list
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
