services:
  kafka:
    image: bitnamilegacy/kafka:3.9.0
    ports:
      - "${KAFKA_BROKER_PORT:-9092}:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "${KAFKA_NODE_ID:-1}"
      KAFKA_KRAFT_CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:${KAFKA_INTERNAL_PORT:-29092},PLAINTEXT_HOST://:9092,CONTROLLER://:${KAFKA_CONTROLLER_PORT:-9093}"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT:-29092},PLAINTEXT_HOST://localhost:${KAFKA_BROKER_PORT:-9092}"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "${KAFKA_NODE_ID:-1}@kafka:${KAFKA_CONTROLLER_PORT:-9093}"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_NUM_PARTITIONS: "1"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    ports:
      - "${TIMESCALEDB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-audio_analytics}"
      POSTGRES_USER: "${POSTGRES_USER:-audio_analytics}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-audio_analytics}"
    volumes:
      - ./infra/sql:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audio_analytics} -d ${POSTGRES_DB:-audio_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 12

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      POSTGRES_DB: "${POSTGRES_DB:-audio_analytics}"
      POSTGRES_USER: "${POSTGRES_USER:-audio_analytics}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-audio_analytics}"
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro,Z
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      SERVICE_NAME: ingestion
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:${KAFKA_INTERNAL_PORT:-29092}}"
      ARTIFACTS_ROOT: "${ARTIFACTS_ROOT:-/app/artifacts}"
      RUN_ID: "${RUN_ID:-demo-run}"
      METADATA_CSV_PATH: "${METADATA_CSV_PATH:-/app/tests/fixtures/audio/smoke_tracks.csv}"
      AUDIO_ROOT_PATH: "${AUDIO_ROOT_PATH:-/app/tests/fixtures/audio/smoke_fma_small}"
      TRACK_ID_ALLOWLIST: "${TRACK_ID_ALLOWLIST-2,666}"
      INGESTION_MAX_TRACKS: "${INGESTION_MAX_TRACKS:-2}"
      KAFKA_PRODUCER_RETRIES: "${KAFKA_PRODUCER_RETRIES:-10}"
      KAFKA_PRODUCER_RETRY_BACKOFF_MS: "${KAFKA_PRODUCER_RETRY_BACKOFF_MS:-250}"
      KAFKA_PRODUCER_RETRY_BACKOFF_MAX_MS: "${KAFKA_PRODUCER_RETRY_BACKOFF_MAX_MS:-5000}"
      KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS: "${KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS:-120000}"
      INGESTION_STARTUP_TIMEOUT_S: "${INGESTION_STARTUP_TIMEOUT_S:-90}"
      INGESTION_STARTUP_RETRY_INTERVAL_S: "${INGESTION_STARTUP_RETRY_INTERVAL_S:-2}"
    volumes:
      - ./artifacts:/app/artifacts:z
      - ./data/local:/app/data/local:ro,z
      - ./tests/fixtures/audio:/app/tests/fixtures/audio:ro,z
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "event_driven_audio_analytics.ingestion.app", "preflight"]
      interval: 15s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  processing:
    build:
      context: .
      dockerfile: services/processing/Dockerfile
    environment:
      SERVICE_NAME: processing
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:${KAFKA_INTERNAL_PORT:-29092}}"
      ARTIFACTS_ROOT: "${ARTIFACTS_ROOT:-/app/artifacts}"
      RUN_ID: "${RUN_ID:-demo-run}"
      METADATA_CSV_PATH: "${METADATA_CSV_PATH:-/app/tests/fixtures/audio/smoke_tracks.csv}"
      AUDIO_ROOT_PATH: "${AUDIO_ROOT_PATH:-/app/tests/fixtures/audio/smoke_fma_small}"
      TRACK_ID_ALLOWLIST: "${TRACK_ID_ALLOWLIST-2,666}"
      INGESTION_MAX_TRACKS: "${INGESTION_MAX_TRACKS:-2}"
      PROCESSING_CONSUMER_GROUP: "${PROCESSING_CONSUMER_GROUP:-event-driven-audio-analytics-processing}"
      PROCESSING_AUTO_OFFSET_RESET: "${PROCESSING_AUTO_OFFSET_RESET:-earliest}"
      PROCESSING_POLL_TIMEOUT_S: "${PROCESSING_POLL_TIMEOUT_S:-1.0}"
      PROCESSING_SESSION_TIMEOUT_MS: "${PROCESSING_SESSION_TIMEOUT_MS:-45000}"
      PROCESSING_MAX_POLL_INTERVAL_MS: "${PROCESSING_MAX_POLL_INTERVAL_MS:-300000}"
      PROCESSING_CONSUMER_RETRY_BACKOFF_MS: "${PROCESSING_CONSUMER_RETRY_BACKOFF_MS:-250}"
      PROCESSING_CONSUMER_RETRY_BACKOFF_MAX_MS: "${PROCESSING_CONSUMER_RETRY_BACKOFF_MAX_MS:-5000}"
      PROCESSING_ARTIFACT_RETRY_ATTEMPTS: "${PROCESSING_ARTIFACT_RETRY_ATTEMPTS:-5}"
      PROCESSING_ARTIFACT_RETRY_BACKOFF_MS: "${PROCESSING_ARTIFACT_RETRY_BACKOFF_MS:-250}"
      PROCESSING_ARTIFACT_RETRY_BACKOFF_MAX_MS: "${PROCESSING_ARTIFACT_RETRY_BACKOFF_MAX_MS:-5000}"
      KAFKA_PRODUCER_RETRIES: "${KAFKA_PRODUCER_RETRIES:-10}"
      KAFKA_PRODUCER_RETRY_BACKOFF_MS: "${KAFKA_PRODUCER_RETRY_BACKOFF_MS:-250}"
      KAFKA_PRODUCER_RETRY_BACKOFF_MAX_MS: "${KAFKA_PRODUCER_RETRY_BACKOFF_MAX_MS:-5000}"
      KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS: "${KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS:-120000}"
    volumes:
      - ./artifacts:/app/artifacts:z
      - ./tests/fixtures/audio:/app/tests/fixtures/audio:ro,z
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "event_driven_audio_analytics.processing.app", "preflight"]
      interval: 15s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  writer:
    build:
      context: .
      dockerfile: services/writer/Dockerfile
    environment:
      SERVICE_NAME: writer
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:${KAFKA_INTERNAL_PORT:-29092}}"
      POSTGRES_DB: "${POSTGRES_DB:-audio_analytics}"
      POSTGRES_USER: "${POSTGRES_USER:-audio_analytics}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-audio_analytics}"
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      RUN_ID: "${RUN_ID:-demo-run}"
      WRITER_CONSUMER_GROUP: "${WRITER_CONSUMER_GROUP:-event-driven-audio-analytics-writer}"
      WRITER_AUTO_OFFSET_RESET: "${WRITER_AUTO_OFFSET_RESET:-earliest}"
      WRITER_POLL_TIMEOUT_S: "${WRITER_POLL_TIMEOUT_S:-1.0}"
      WRITER_SESSION_TIMEOUT_MS: "${WRITER_SESSION_TIMEOUT_MS:-45000}"
      WRITER_MAX_POLL_INTERVAL_MS: "${WRITER_MAX_POLL_INTERVAL_MS:-300000}"
      WRITER_CONSUMER_RETRY_BACKOFF_MS: "${WRITER_CONSUMER_RETRY_BACKOFF_MS:-250}"
      WRITER_CONSUMER_RETRY_BACKOFF_MAX_MS: "${WRITER_CONSUMER_RETRY_BACKOFF_MAX_MS:-5000}"
      WRITER_DB_POOL_MIN_SIZE: "${WRITER_DB_POOL_MIN_SIZE:-1}"
      WRITER_DB_POOL_MAX_SIZE: "${WRITER_DB_POOL_MAX_SIZE:-4}"
      WRITER_DB_POOL_TIMEOUT_S: "${WRITER_DB_POOL_TIMEOUT_S:-30.0}"
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "event_driven_audio_analytics.writer.app", "preflight"]
      interval: 15s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  review:
    build:
      context: .
      dockerfile: services/review/Dockerfile
    ports:
      - "${REVIEW_PORT:-8080}:8080"
    environment:
      SERVICE_NAME: review
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      ARTIFACTS_ROOT: "${ARTIFACTS_ROOT:-/app/artifacts}"
      POSTGRES_DB: "${POSTGRES_DB:-audio_analytics}"
      POSTGRES_USER: "${POSTGRES_USER:-audio_analytics}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-audio_analytics}"
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      REVIEW_HOST: "0.0.0.0"
      REVIEW_PORT: "8080"
      REVIEW_DEFAULT_LIMIT: "${REVIEW_DEFAULT_LIMIT:-8}"
      REVIEW_MAX_LIMIT: "${REVIEW_MAX_LIMIT:-25}"
      REVIEW_PINNED_RUN_IDS: "${REVIEW_PINNED_RUN_IDS:-demo-high-energy,demo-silent-oriented,demo-validation-failure}"
    volumes:
      - ./artifacts:/app/artifacts:z
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "event_driven_audio_analytics.review.app", "preflight"]
      interval: 15s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dataset-exporter:
    build:
      context: .
      dockerfile: services/dataset-exporter/Dockerfile
    environment:
      SERVICE_NAME: dataset-exporter
      ARTIFACTS_ROOT: "${ARTIFACTS_ROOT:-/app/artifacts}"
      DATASET_EXPORT_ROOT: "${DATASET_EXPORT_ROOT:-/app/artifacts/datasets}"
      POSTGRES_DB: "${POSTGRES_DB:-audio_analytics}"
      POSTGRES_USER: "${POSTGRES_USER:-audio_analytics}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-audio_analytics}"
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
    volumes:
      - ./artifacts:/app/artifacts:z
    depends_on:
      timescaledb:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pytest:
    build:
      context: .
      dockerfile: services/pytest/Dockerfile
    environment:
      PYTHONPATH: /app/src
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:${KAFKA_INTERNAL_PORT:-29092}}"
      POSTGRES_DB: "${POSTGRES_DB:-audio_analytics}"
      POSTGRES_USER: "${POSTGRES_USER:-audio_analytics}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-audio_analytics}"
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: "5432"
      ARTIFACTS_ROOT: "${ARTIFACTS_ROOT:-/app/artifacts}"
      RUN_ID: "${RUN_ID:-demo-run}"
      METADATA_CSV_PATH: "${METADATA_CSV_PATH:-/app/tests/fixtures/audio/smoke_tracks.csv}"
      AUDIO_ROOT_PATH: "${AUDIO_ROOT_PATH:-/app/tests/fixtures/audio/smoke_fma_small}"
      TRACK_ID_ALLOWLIST: "${TRACK_ID_ALLOWLIST-2,666}"
      INGESTION_MAX_TRACKS: "${INGESTION_MAX_TRACKS:-2}"
    volumes:
      - ./artifacts:/app/artifacts:z
